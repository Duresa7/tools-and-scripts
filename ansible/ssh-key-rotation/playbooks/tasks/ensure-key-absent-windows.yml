---
- name: Remove only the exact selected Windows public key
  ansible.windows.win_powershell:
    parameters:
      Path: "{{ ssh_authorized_keys_path }}"
      PublicKey: "{{ ssh_public_key_to_manage }}"
    script: |
      [CmdletBinding(SupportsShouldProcess)]
      param([string]$Path, [string]$PublicKey)
      function Get-KeyMaterial {
        param([string]$Line)
        $parts = @($Line.Trim() -split '\s+')
        for ($index = 0; $index -lt ($parts.Count - 1); $index++) {
          if ($parts[$index] -match '^(ssh-(ed25519|rsa)|ecdsa-sha2-nistp(256|384|521))$') {
            return $parts[$index] + ' ' + $parts[$index + 1]
          }
        }
        return $null
      }
      if (-not (Test-Path -LiteralPath $Path -PathType Leaf)) {
        $Ansible.Changed = $false
        $Ansible.Result = @{ removed = 0 }
        return
      }
      $targetMaterial = Get-KeyMaterial -Line $PublicKey
      if (-not $targetMaterial) { throw 'Invalid public key' }
      $kept = @()
      $removed = 0
      foreach ($line in (Get-Content -LiteralPath $Path -ErrorAction Stop)) {
        if ((Get-KeyMaterial -Line $line) -eq $targetMaterial) {
          $removed += 1
        } else {
          $kept += $line
        }
      }
      if ($removed -gt 0) {
        $Ansible.Changed = $true
        if (-not $Ansible.CheckMode) {
          [System.IO.File]::WriteAllLines($Path, $kept, [System.Text.UTF8Encoding]::new($false))
        }
      } else {
        $Ansible.Changed = $false
      }
      $Ansible.Result = @{ removed = $removed }
