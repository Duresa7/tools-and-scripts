# Strict KEY=value file. Values are literal; shell expansion is not evaluated.

# CUSTOMIZE: Select ifupdown, netplan, or networkmanager.
STACK=ifupdown
# CUSTOMIZE: Set the Linux device name reported by `ip link`.
INTERFACE=enp1s0
# CUSTOMIZE: Set the existing profile name reported by `nmcli connection show`.
CONNECTION_NAME=server-static
# CUSTOMIZE: For ifupdown or Netplan, set the reviewed replacement file.
CANDIDATE_FILE=/home/example/network-cutover/interfaces.candidate
# CUSTOMIZE: For ifupdown, use /etc/network/interfaces. For Netplan, name one file under /etc/netplan.
SOURCE_FILE=/etc/network/interfaces
# CUSTOMIZE: Set the one global IPv4 address expected after activation.
EXPECT_IPV4=192.0.2.10/24
# CUSTOMIZE: Set the one default IPv4 gateway expected after activation.
EXPECT_GATEWAY=192.0.2.1
# CUSTOMIZE: Set the exact default route, including device, protocol, and metric. Separate multiple routes with |.
EXPECT_ROUTES=default via 192.0.2.1 dev enp1s0 proto static metric 100
# CUSTOMIZE: Set the exact DNS server set. Separate multiple addresses with commas.
EXPECT_DNS=192.0.2.53
# CUSTOMIZE: Set a hostname your resolver must answer. Leave empty to skip resolution.
DNS_PROBE=example.com
# CUSTOMIZE: Increase this only when profile activation normally takes longer than 30 seconds.
TIMEOUT_SECONDS=30
