[tool.pytest.ini_options]
addopts = "-ra"
testpaths = [
  "tests",
  "networking/networkmanager-cutover/tests",
  "monitoring/prometheus-target-check/tests",
  "backup-and-recovery/semaphore-sqlite-guard/tests",
  "migrations/teamspeak-channel-migration/tests",
  "identity-and-access/ssh-key-rotation/tests",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["B", "C4", "E", "F", "I", "PIE", "RUF", "SIM", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
