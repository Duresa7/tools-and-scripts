name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --requirement requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest
      - run: python -m compileall -q prometheus semaphore teamspeak ansible/ssh-key-rotation/tests

  shell-and-ansible:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install "ansible-lint>=24,<26"
      - run: sudo apt-get update
      - run: sudo apt-get install --yes shellcheck
      - run: shellcheck networkmanager/networkmanager-ifupdown-cutover.sh
      - run: bash -n networkmanager/networkmanager-ifupdown-cutover.sh
      - run: ansible-galaxy collection install --requirements-file ansible/ssh-key-rotation/requirements.yml
      - run: python ansible/ssh-key-rotation/tests/validate_project.py
      - name: Lint the Ansible project
        working-directory: ansible/ssh-key-rotation
        run: ansible-lint --offline
      - name: Check Ansible playbook syntax
        working-directory: ansible/ssh-key-rotation
        run: |
          for playbook in playbooks/ssh-identity-onboard.yml playbooks/ssh-key-audit.yml playbooks/ssh-key-stage.yml playbooks/ssh-key-verify.yml playbooks/ssh-key-retire.yml; do
            ansible-playbook --syntax-check "$playbook"
          done
