---
- name: Add the selected Windows public key and enforce its ACL
  ansible.windows.win_powershell:
    parameters:
      Path: "{{ ssh_authorized_keys_path }}"
      PublicKey: "{{ ssh_public_key_to_manage }}"
      Owner: "{{ ssh_key_owner }}"
      AccountType: "{{ ssh_key_windows_account_type }}"
      State: present
    script: "{{ lookup('ansible.builtin.file', playbook_dir + '/files/Manage-AuthorizedKey.ps1') }}"
  become: "{{ ssh_key_become | default(false) | bool }}"
